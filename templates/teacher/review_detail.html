{% extends 'base.html' %}
{% block title %}تصحیح پاسخ | آزمون‌یار{% endblock %}
{% block content %}
<section class="super-admin-page" dir="rtl">
    <div class="super-admin-heading"><span class="super-admin-kicker">تصحیح</span><h1>{{ review.exam }}</h1></div>
    <div class="super-admin-grid">
        <article class="super-admin-card"><h2>پاسخ دانشجو</h2><p>{{ review.answer_text }}</p></article>
        <article class="super-admin-card"><h2>ثبت نمره</h2><form method="post" class="super-admin-form">{% csrf_token %}{{ form.as_p }}<button class="super-admin-primary">ذخیره تصحیح</button></form></article>
    </div>
</section>
{% endblock %}
