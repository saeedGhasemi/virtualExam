{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}سامانه آزمون مجازی{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dist/styles.css' %}">
</head>
<body class="min-h-screen overflow-x-hidden bg-page text-ink antialiased">
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,rgba(20,184,166,0.20),transparent_34%),linear-gradient(135deg,#f7f3ea_0%,#eef7f4_45%,#f5f7fb_100%)]"></div>
    <div class="fixed inset-x-0 top-0 -z-10 h-72 bg-[linear-gradient(90deg,rgba(15,118,110,0.12),rgba(234,88,12,0.10),rgba(37,99,235,0.08))]"></div>

    <header class="sticky top-0 z-30 border-b border-white/60 bg-white/75 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-5 py-4 lg:px-8">
            <a href="/" class="flex min-w-0 items-center gap-3">
                <span class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-ink text-lg font-black text-white shadow-soft">آ</span>
                <span class="min-w-0">
                    <span class="block truncate text-base font-extrabold tracking-normal text-ink sm:text-lg">آزمون‌یار</span>
                    <span class="block truncate text-xs font-medium text-muted sm:text-sm">مدیریت آزمون‌های آنلاین</span>
                </span>
            </a>

            <nav class="hidden items-center gap-2 rounded-full border border-white/70 bg-white/65 p-1 text-sm font-semibold text-muted shadow-subtle md:flex">
                <a href="#overview" class="rounded-full px-4 py-2 text-ink">نمای کلی</a>
                <a href="#exam-list" class="rounded-full px-4 py-2 transition hover:bg-slate-100 hover:text-ink">آزمون‌ها</a>
                <a href="/admin/" class="rounded-full px-4 py-2 transition hover:bg-slate-100 hover:text-ink">مدیریت</a>
            </nav>

            <a href="/admin/" class="btn-primary shrink-0">
                ورود مدیریت
                <span aria-hidden="true">←</span>
            </a>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-5 py-8 lg:px-8 lg:py-12">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
