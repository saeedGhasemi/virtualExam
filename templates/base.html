{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}سامانه آزمون مجازی{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'dist/styles.css' %}">
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
            <div>
                <h1 class="text-xl font-bold text-brand">سامانه آزمون مجازی</h1>
                <p class="text-sm text-slate-500">مدیریت و برگزاری آزمون‌های آنلاین</p>
            </div>
            <a href="/admin/" class="btn-primary">ورود مدیریت</a>
        </div>
    </header>
    <main class="mx-auto max-w-6xl px-6 py-10">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
